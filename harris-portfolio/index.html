<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Harris Photography — Client Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#0e0f12;overflow:hidden}
  /* full-bleed frame; the Apps Script app fills it. Loaded in an iframe so Google's
     "created by another user" disclaimer bar is suppressed. */
  #app{position:fixed;inset:0;width:100%;height:100%;border:0;display:block}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;
        background:radial-gradient(120% 90% at 50% 42%,#15171c 0%,#0e0f12 72%);
        z-index:2;transition:opacity .55s ease}
  #load.hide{opacity:0;pointer-events:none}
  .lw{animation:breathe 2.8s ease-in-out infinite}
  /* Allura = the Harris Photography watermark script; cream matches the on-photo mark */
  .mark{font-family:"Allura",cursive;font-size:clamp(46px,13vw,96px);line-height:1;
        color:#ece7d9;text-shadow:0 1px 14px rgba(0,0,0,.45);white-space:nowrap}
  @keyframes breathe{0%,100%{opacity:.55}50%{opacity:1}}
</style>
</head>
<body>
  <div id="load"><div class="lw"><div class="mark">Harris Photography</div></div></div>
  <iframe id="app" title="Harris Photography — Client Portfolio"
    allow="fullscreen"
    src="https://script.google.com/macros/s/AKfycbwsFzE34mU2x9Wii4gAzhO2iw2jwoMt43TY82z5hstlUjnUE7wcyrVH8-jo_31u8C-V/exec?mode=portfolio"
    onload="document.getElementById('load').classList.add('hide')"></iframe>
</body>
</html>
