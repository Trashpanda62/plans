<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0e0f12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Harris Gallery">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Harris Photography — Your Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#0e0f12;overflow:hidden}
  /* full-bleed frame; the Apps Script app fills it. Loaded in an iframe so Google's
     "created by another user" disclaimer bar is suppressed. */
  #app{position:fixed;inset:0;width:100%;height:100%;border:0;display:block}

  /* ---- loading splash ---- */
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;
        background:radial-gradient(130% 100% at 50% 40%,#191b21 0%,#101116 55%,#0b0c0f 100%);
        z-index:2;transition:opacity .6s ease}
  #load.hide{opacity:0;pointer-events:none}
  #load::after{content:"";position:absolute;inset:0;pointer-events:none;
        background:radial-gradient(70% 55% at 50% 42%,transparent 60%,rgba(0,0,0,.45) 100%)}
  .lw{position:relative;text-align:center;animation:rise 1s cubic-bezier(.2,.7,.2,1) both}
  /* Allura = the Harris Photography watermark script; cream base with a slow gold sheen */
  .mark{font-family:"Allura",cursive;font-size:clamp(42px,12vw,92px);line-height:1;white-space:nowrap;
        background:linear-gradient(100deg,#cfc6ae 0%,#ece7d9 36%,#fbf4de 47%,#e6c583 52%,#ece7d9 63%,#cfc6ae 100%);
        background-size:230% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
        filter:drop-shadow(0 2px 16px rgba(0,0,0,.55));animation:sheen 5s ease-in-out infinite}
  .rule{height:1px;width:0;margin:16px auto 13px;
        background:linear-gradient(90deg,transparent,#c8a86a 50%,transparent);
        animation:grow 1.1s .45s cubic-bezier(.2,.7,.2,1) forwards}
  .tag{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
        font-size:10.5px;letter-spacing:.4em;text-transform:uppercase;color:#b7a06f;
        padding-left:.4em;opacity:0;animation:fade 1s .8s ease-out forwards}
  .dots{display:flex;gap:7px;justify-content:center;margin-top:24px;opacity:0;animation:fade 1s 1.15s ease forwards}
  .dots i{width:6px;height:6px;border-radius:50%;background:#c8a86a;animation:blink 1.4s ease-in-out infinite}
  .dots i:nth-child(2){animation-delay:.18s}.dots i:nth-child(3){animation-delay:.36s}
  @keyframes sheen{0%{background-position:125% 0}100%{background-position:-125% 0}}
  @keyframes grow{to{width:min(240px,70vw)}}
  @keyframes rise{from{opacity:0;transform:translateY(16px);filter:blur(7px)}to{opacity:1;transform:none;filter:blur(0)}}
  @keyframes fade{to{opacity:.92}}
  @keyframes blink{0%,100%{opacity:.22;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
  @media(prefers-reduced-motion:reduce){.mark,.rule,.tag,.dots,.dots i,.lw{animation:none}
    .rule{width:min(240px,70vw)}.tag,.dots{opacity:.9}}
</style>
</head>
<body>
  <div id="load">
    <div class="lw">
      <div class="mark">Harris Photography</div>
      <div class="rule"></div>
      <div class="tag">Family Day &middot; July 2026</div>
      <div class="dots"><i></i><i></i><i></i></div>
    </div>
  </div>
  <iframe id="app" title="Harris Photography — Your Gallery"
    allow="fullscreen"
    src="https://script.google.com/macros/s/AKfycbwsFzE34mU2x9Wii4gAzhO2iw2jwoMt43TY82z5hstlUjnUE7wcyrVH8-jo_31u8C-V/exec?g=familyday"
    onload="document.getElementById('load').classList.add('hide')"></iframe>
</body>
</html>
