<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Harris Photography — Your Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#0e0f12;overflow:hidden}
  /* full-bleed frame; the Apps Script app fills it. Loaded in an iframe so Google's
     "created by another user" disclaimer bar is suppressed. */
  #app{position:fixed;inset:0;width:100%;height:100%;border:0;display:block}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
        background:radial-gradient(120% 90% at 50% 40%,#15171c 0%,#0e0f12 70%);
        z-index:2;transition:opacity .55s ease}
  #load.hide{opacity:0;pointer-events:none}
  .lw{text-align:center;animation:breathe 2.6s ease-in-out infinite}
  .mark{font-family:"Cormorant Garamond",Georgia,serif;font-weight:500;
        font-size:clamp(30px,8.5vw,50px);letter-spacing:.05em;color:#efe9db;line-height:1.05}
  .rule{width:52px;height:1px;background:#c8a86a;opacity:.85;margin:15px auto 12px}
  .sub{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       font-size:10.5px;letter-spacing:.52em;text-transform:uppercase;color:#c8a86a;padding-left:.52em}
  @keyframes breathe{0%,100%{opacity:.5}50%{opacity:1}}
</style>
</head>
<body>
  <div id="load">
    <div class="lw">
      <div class="mark">Harris Photography</div>
      <div class="rule"></div>
      <div class="sub">Photography</div>
    </div>
  </div>
  <iframe id="app" title="Harris Photography — Your Gallery"
    allow="fullscreen"
    src="https://script.google.com/macros/s/AKfycbwsFzE34mU2x9Wii4gAzhO2iw2jwoMt43TY82z5hstlUjnUE7wcyrVH8-jo_31u8C-V/exec?g=familyday"
    onload="document.getElementById('load').classList.add('hide')"></iframe>
</body>
</html>
